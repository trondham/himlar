[OUTPUT]
    Name   http
    Match  uio_logs_5000_*

    Host   dataops-rec-uio.educloud.no
    Port   5000

    Format json
    Workers 1
    storage.total_limit_size  100M
    Retry_Limit no_limits

    tls On
    tls.verify On
    tls.ca_file /etc/pki/tls/certs/ca-bundle.crt
    tls.crt_file /etc/pki/tls/certs/resolver.vagrant.iaas.intern.cert.pem
    tls.key_file /etc/pki/tls/private/resolver.vagrant.iaas.intern.key.pem
    #tls.debug 4

